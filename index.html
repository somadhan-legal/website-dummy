        <h1>Somadhan | AI-Powered Legal Support Platform in Bangladesh</h1>
        <p>Somadhan connects people in Bangladesh with verified lawyers for legal consultations, document support, bookings, calls, and case-related legal services.</p>
        <h2>Core legal service areas</h2>
        <ul>
          <li>Corporate and business law: formation, mergers and acquisitions, contracts, and compliance.</li>
          <li>Family and personal law: divorce, custody, marriage, and inheritance.</li>
          <li>Property and real estate law: transactions, disputes, and land matters.</li>
          <li>Criminal defense: defense, bail, and criminal matters.</li>
          <li>Litigation and disputes: civil suits, arbitration, and mediation.</li>
          <li>Intellectual property: patents, trademarks, and copyrights.</li>
          <li>Employment and labor law: workplace rights, contracts, and disputes.</li>
          <li>Immigration: visas, work permits, and citizenship.</li>
        </ul>
        <h2>How Somadhan works</h2>
        <ol>
          <li>Describe your legal problem in simple words.</li>
          <li>Find the right legal category and relevant verified lawyers.</li>
          <li>Choose a lawyer based on service fit and experience.</li>
          <li>Book a suitable time and complete the required steps.</li>
          <li>Connect with the lawyer through audio or video consultation.</li>
        </ol>
        <h2>Trust and safety</h2>
        <ul>
          <li>Somadhan works with verified and approved legal professionals.</li>
          <li>Personal information and legal documents are handled according to privacy and data protection standards.</li>
          <li>Uploaded documents are accessible only to the user and the assigned lawyer.</li>
          <li>Users can track calls, bookings, events, and service activity in the platform.</li>
        </ul>
        <p>Somadhan is a technology platform and is not a law firm. Legal advice provided through the platform comes from the assigned independent lawyer.</p>
