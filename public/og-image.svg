<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#054045"/>
      <stop offset="50%" stop-color="#075056"/>
      <stop offset="100%" stop-color="#043034"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#5DB8BA" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#075056" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="15%" cy="90%" r="50%">
      <stop offset="0%" stop-color="#338C91" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#075056" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Subtle dot pattern -->
  <g opacity="0.06" fill="#FFFFFF">
    <circle cx="80" cy="80" r="2"/>
    <circle cx="160" cy="80" r="2"/>
    <circle cx="240" cy="80" r="2"/>
    <circle cx="320" cy="80" r="2"/>
    <circle cx="400" cy="80" r="2"/>
    <circle cx="80" cy="160" r="2"/>
    <circle cx="160" cy="160" r="2"/>
    <circle cx="240" cy="160" r="2"/>
    <circle cx="320" cy="160" r="2"/>
    <circle cx="1040" cy="470" r="2"/>
    <circle cx="1120" cy="470" r="2"/>
    <circle cx="960" cy="550" r="2"/>
    <circle cx="1040" cy="550" r="2"/>
    <circle cx="1120" cy="550" r="2"/>
  </g>

  <!-- Decorative top-right accent bar -->
  <rect x="1050" y="80" width="70" height="4" rx="2" fill="#5DB8BA" opacity="0.6"/>
  <circle cx="1140" cy="82" r="5" fill="#5DB8BA" opacity="0.8"/>

  <!-- Small badge top-left -->
  <g transform="translate(80, 90)">
    <rect x="0" y="0" width="220" height="38" rx="19" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="1"/>
    <circle cx="22" cy="19" r="5" fill="#34D399"/>
    <circle cx="22" cy="19" r="5" fill="#34D399" opacity="0.4">
      <animate attributeName="r" values="5;9;5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="42" y="25" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="#FFFFFF" fill-opacity="0.9" letter-spacing="0.05em">#1 AI-POWERED LEGAL PLATFORM</text>
  </g>

  <!-- Main wordmark: SOMADHAN -->
  <text x="80" y="320" font-family="'Playfair Display', 'Times New Roman', serif" font-size="140" font-weight="500" fill="#FFFFFF" letter-spacing="-0.02em">Somadhan</text>

  <!-- Subheadline -->
  <text x="82" y="390" font-family="'Playfair Display', 'Times New Roman', serif" font-size="44" font-weight="400" font-style="italic" fill="#FFFFFF" fill-opacity="0.65" letter-spacing="-0.01em">Legal support. Anytime, anywhere.</text>

  <!-- Description -->
  <text x="82" y="460" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="400" fill="#FFFFFF" fill-opacity="0.75">AI-powered legal platform connecting Bangladesh</text>
  <text x="82" y="492" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="400" fill="#FFFFFF" fill-opacity="0.75">with verified lawyers for consultations, documents &amp; cases.</text>

  <!-- Bottom divider -->
  <line x1="80" y1="550" x2="1120" y2="550" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1"/>

  <!-- Footer row -->
  <text x="80" y="585" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#FFFFFF" letter-spacing="0.1em">SOMADHAN.COM</text>

  <!-- Footer chips -->
  <g transform="translate(720, 568)">
    <rect x="0" y="0" width="130" height="32" rx="16" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.15"/>
    <text x="65" y="21" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#FFFFFF" fill-opacity="0.85" text-anchor="middle">Verified Lawyers</text>
  </g>
  <g transform="translate(860, 568)">
    <rect x="0" y="0" width="110" height="32" rx="16" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.15"/>
    <text x="55" y="21" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#FFFFFF" fill-opacity="0.85" text-anchor="middle">100% Private</text>
  </g>
  <g transform="translate(980, 568)">
    <rect x="0" y="0" width="140" height="32" rx="16" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.15"/>
    <text x="70" y="21" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#FFFFFF" fill-opacity="0.85" text-anchor="middle">Anywhere Access</text>
  </g>
</svg>
